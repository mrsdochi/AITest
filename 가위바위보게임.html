<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>가위바위보 게임</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f7fb;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .game-box {
            background: white;
            padding: 24px 28px;
            border-radius: 16px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.15);
            text-align: center;
            width: 320px;
        }

        h1 {
            margin-top: 0;
            color: #1f3c88;
        }

        .buttons {
            display: flex;
            justify-content: space-between;
            gap: 10px;
            margin: 20px 0;
        }

        button {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 8px;
            background: #1f3c88;
            color: white;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover {
            background: #365bb3;
        }

        .result {
            margin-top: 16px;
            font-size: 18px;
            font-weight: bold;
            color: #333;
        }

        .score {
            margin-top: 12px;
            color: #555;
        }
    </style>
</head>
<body>
    <div class="game-box">
        <h1>가위바위보 게임</h1>
        <p>버튼을 눌러서 컴퓨터와 겨뤄보세요.</p>
        <div class="buttons">
            <button data-choice="가위">가위</button>
            <button data-choice="바위">바위</button>
            <button data-choice="보">보</button>
        </div>
        <div id="result" class="result">결과를 기다리는 중입니다.</div>
        <div id="score" class="score">승: 0 | 패: 0 | 무: 0</div>
    </div>

    <script>
        const choices = ["가위", "바위", "보"];
        const score = { win: 0, lose: 0, draw: 0 };

        document.querySelectorAll("button[data-choice]").forEach((button) => {
            button.addEventListener("click", () => {
                play(button.dataset.choice);
            });
        });

        function play(userChoice) {
            const computerChoice = choices[Math.floor(Math.random() * choices.length)];
            let resultText = "";

            if (userChoice === computerChoice) {
                resultText = `비겼습니다! 당신: ${userChoice} / 컴퓨터: ${computerChoice}`;
                score.draw += 1;
            } else if (
                (userChoice === "가위" && computerChoice === "보") ||
                (userChoice === "바위" && computerChoice === "가위") ||
                (userChoice === "보" && computerChoice === "바위")
            ) {
                resultText = `이겼습니다! 당신: ${userChoice} / 컴퓨터: ${computerChoice}`;
                score.win += 1;
            } else {
                resultText = `졌습니다! 당신: ${userChoice} / 컴퓨터: ${computerChoice}`;
                score.lose += 1;
            }

            document.getElementById("result").textContent = resultText;
            document.getElementById("score").textContent = `승: ${score.win} | 패: ${score.lose} | 무: ${score.draw}`;
        }
    </script>
</body>
</html>
